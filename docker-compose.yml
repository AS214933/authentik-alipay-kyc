services:
  alipay-kyc:
    image: ghcr.io/as214933/authentik-alipay-kyc:latest
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      PUBLIC_URL: "https://kyc.example.com"
      SESSION_KEYS: "${SESSION_KEYS}"
      HASH_PEPPER: "${HASH_PEPPER}"
      STATS_FILE: "/data/stats.json"
      STATS_API_TOKEN: "${STATS_API_TOKEN}"
      KYC_PII_DIR: "/data/kyc_pii"
      KYC_QR_NOTICE_HTML: "${KYC_QR_NOTICE_HTML:-}"
      PII_ENCRYPTION_PUBLIC_KEY_TYPE: "${PII_ENCRYPTION_PUBLIC_KEY_TYPE:-rsa}"
      PII_ENCRYPTION_PUBLIC_KEY_FILE: "/pii-public.pem"
      ADMIN_ENABLED: "${ADMIN_ENABLED:-false}"
      ADMIN_ALLOWED_USERNAMES: "${ADMIN_ALLOWED_USERNAMES:-}"
      OIDC_ISSUER: "https://authentik.example.com/application/o/alipay-kyc/"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      AUTHENTIK_BASE_URL: "https://authentik.example.com"
      AUTHENTIK_TOKEN: "${AUTHENTIK_TOKEN}"
      AUTHENTIK_USER_ID_CLAIM: "ak_user_id"
      AUTHENTIK_ATTRIBUTE_KEY: "alipay_kyc"
      ALIPAY_KYC_ENABLED: "${ALIPAY_KYC_ENABLED:-true}"
      ALIPAY_GATEWAY_URL: "https://openapi.alipay.com/gateway.do"
      ALIPAY_APP_ID: "${ALIPAY_APP_ID:-}"
      ALIPAY_APP_PRIVATE_KEY: "${ALIPAY_APP_PRIVATE_KEY:-}"
      ALIPAY_PUBLIC_KEY: "${ALIPAY_PUBLIC_KEY:-}"
      ALIPAY_BIZ_CODE: "FACE"
      ALIPAY_CERT_TYPE: "IDENTITY_CARD"
      ALIYUN_KYC_ENABLED: "${ALIYUN_KYC_ENABLED:-false}"
      ALIYUN_ACCESS_KEY_ID: "${ALIYUN_ACCESS_KEY_ID:-}"
      ALIYUN_ACCESS_KEY_SECRET: "${ALIYUN_ACCESS_KEY_SECRET:-}"
      ALIYUN_SCENE_ID: "${ALIYUN_SCENE_ID:-}"
      ALIYUN_ENDPOINTS: "${ALIYUN_ENDPOINTS:-cloudauth.cn-shanghai.aliyuncs.com,cloudauth.cn-beijing.aliyuncs.com}"
      ALIYUN_PRODUCT_CODE: "${ALIYUN_PRODUCT_CODE:-ID_PRO}"
      ALIYUN_MODEL: "${ALIYUN_MODEL:-MOVE_ACTION}"
      ALIYUN_CERT_TYPE: "${ALIYUN_CERT_TYPE:-IDENTITY_CARD}"
    volumes:
      - alipay-kyc-data:/data
      - ./pii-public.pem:/pii-public.pem:ro

volumes:
  alipay-kyc-data:
